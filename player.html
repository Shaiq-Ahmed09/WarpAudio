<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraStream | Custom Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for premium sleek UI icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Custom scrollbar for the playlist */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -4px;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: #818cf8;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #3f3f46;
            border-radius: 99px;
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans h-screen flex flex-col overflow-hidden selection:bg-indigo-500/30">

    <!-- UPLOAD MODAL (Hidden by default) -->
    <div id="upload-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center transition-opacity">
        <div class="bg-gray-900 border border-white/10 p-8 rounded-3xl w-full max-w-md shadow-2xl relative">
            <button onclick="toggleModal(false)" class="absolute top-6 right-6 text-gray-500 hover:text-white transition"><i class="ph ph-x text-xl"></i></button>
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="ph-fill ph-upload-simple text-indigo-500"></i> Add New Track</h2>
            
            <form id="upload-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Audio File (*)</label>
                    <input type="file" id="audio-input" accept="audio/*" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20 transition cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Track Title (*)</label>
                    <input type="text" id="title-input" placeholder="e.g. Midnight City" required class="w-full bg-gray-950 rounded-xl p-3 border border-white/5 text-white outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Artist / Author (*)</label>
                    <input type="text" id="artist-input" placeholder="e.g. M83" required class="w-full bg-gray-950 rounded-xl p-3 border border-white/5 text-white outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Cover Art (Optional)</label>
                    <input type="file" id="cover-input" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-white/5 file:text-white hover:file:bg-white/10 transition cursor-pointer">
                </div>
                <div class="pt-4">
                    <button type="submit" id="submit-btn" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition font-bold shadow-lg shadow-indigo-600/20 flex justify-center items-center gap-2">
                        Upload to Library
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Top Navigation -->
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/5 bg-gray-900/50 backdrop-blur-md z-10 relative">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="ph-fill ph-music-notes text-xl text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Aura<span class="text-indigo-400">Stream</span></h1>
        </div>
        <button onclick="toggleModal(true)" class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/10 hover:bg-white/20 transition-all border border-white/5 font-medium text-sm">
            <i class="ph ph-upload-simple text-lg"></i>
            Upload Music
        </button>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Background Ambient Glow -->
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10 pointer-events-none"></div>

        <!-- Sidebar -->
        <aside class="w-64 flex-shrink-0 border-r border-white/5 bg-gray-900/20 p-6 hidden md:block z-10">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">Library</p>
            <ul class="space-y-2">
                <li>
                    <a href="#" class="flex items-center gap-3 text-indigo-400 bg-white/5 py-2.5 px-4 rounded-lg font-medium transition-colors">
                        <i class="ph ph-playlist text-lg"></i>
                        Local Uploads
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Playlist Area -->
        <div class="flex-1 overflow-y-auto p-8 pb-32 z-10">
            <!-- Header Section -->
            <div class="flex items-end gap-6 mb-10">
                <div id="album-art" class="w-48 h-48 rounded-2xl shadow-2xl bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center border border-white/5 transition-all duration-500 relative overflow-hidden">
                    <i class="ph ph-music-note text-6xl text-gray-700"></i>
                </div>
                <div class="pb-2">
                    <p class="text-sm font-medium text-indigo-400 uppercase tracking-wider mb-2">Private Session</p>
                    <h2 class="text-5xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">Your Tracks</h2>
                    <p id="track-count" class="text-gray-400 font-medium">0 tracks</p>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-center border-2 border-dashed border-gray-800 rounded-3xl">
                <div class="w-16 h-16 rounded-full bg-gray-900 flex items-center justify-center mb-4 text-gray-500">
                    <i class="ph ph-headphones text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">No music uploaded yet</h3>
                <p class="text-gray-500 mb-6 max-w-md">Add tracks, artist info, and custom cover art to build your library.</p>
                <button onclick="toggleModal(true)" class="flex items-center gap-2 px-6 py-3 rounded-full bg-indigo-600 hover:bg-indigo-500 transition-all font-semibold shadow-lg shadow-indigo-500/25">
                    <i class="ph ph-plus-circle text-xl"></i>
                    Upload Your First Track
                </button>
            </div>

            <!-- Track List -->
            <div id="playlist-container" class="w-full hidden">
                <div class="grid grid-cols-[auto_1fr_auto] gap-4 px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-white/5 mb-2">
                    <div class="w-8 text-center">#</div>
                    <div>Title & Artist</div>
                    <div class="w-40 text-right pr-2">Date Added</div>
                </div>
                <div id="track-list" class="space-y-1">
                    <!-- Tracks will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Player Bar -->
    <div class="fixed bottom-0 left-0 right-0 h-24 bg-gray-950/95 backdrop-blur-xl border-t border-white/5 px-6 flex items-center justify-between z-20">
        
        <!-- Now Playing Info -->
        <div class="w-1/3 flex items-center gap-4 min-w-0">
            <div id="player-art" class="w-14 h-14 rounded-lg bg-gray-900 border border-white/5 flex items-center justify-center flex-shrink-0 transition-all duration-300 overflow-hidden">
                <i class="ph ph-music-note text-xl text-gray-700"></i>
            </div>
            <div class="truncate">
                <h4 id="player-title" class="font-bold text-white truncate text-sm">No Track Playing</h4>
                <p id="player-artist" class="text-xs text-gray-400 truncate mt-0.5">Upload music to start</p>
            </div>
        </div>

        <!-- Player Controls -->
        <div class="flex-1 max-w-2xl flex flex-col items-center justify-center gap-2">
            <div class="flex items-center gap-6">
                <button id="prev-btn" class="text-gray-400 hover:text-white transition-colors disabled:opacity-30">
                    <i class="ph-fill ph-skip-back text-2xl"></i>
                </button>
                <button id="play-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-black hover:scale-105 transition-transform disabled:opacity-50 disabled:hover:scale-100">
                    <i class="ph-fill ph-play text-xl ml-1" id="play-icon"></i>
                </button>
                <button id="next-btn" class="text-gray-400 hover:text-white transition-colors disabled:opacity-30">
                    <i class="ph-fill ph-skip-forward text-2xl"></i>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="w-full flex items-center gap-3 text-xs font-medium text-gray-500">
                <span id="current-time" class="w-10 text-right">0:00</span>
                <div class="flex-1 relative flex items-center">
                    <div id="progress-fill" class="absolute left-0 h-1 bg-white rounded-full pointer-events-none" style="width: 0%;"></div>
                    <input type="range" id="progress-bar" min="0" max="100" value="0" class="w-full z-10" disabled>
                </div>
                <span id="total-time" class="w-10">0:00</span>
            </div>
        </div>

        <!-- Volume Control -->
        <div class="w-1/3 flex items-center justify-end gap-3 min-w-0 pr-4 hidden md:flex">
            <i class="ph-fill ph-speaker-high text-gray-400 text-lg"></i>
            <div class="w-24 relative flex items-center">
                <div id="volume-fill" class="absolute left-0 h-1 bg-white rounded-full pointer-events-none" style="width: 100%;"></div>
                <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1" class="w-full z-10">
            </div>
        </div>
    </div>

    <!-- The Brains (JavaScript) -->
    <script>
        let playlist = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        const audio = new Audio();
        const API_BASE = "http://127.0.0.1:8000";

        // DOM Elements
        const modal = document.getElementById('upload-modal');
        const uploadForm = document.getElementById('upload-form');
        const submitBtn = document.getElementById('submit-btn');
        
        const emptyState = document.getElementById('empty-state');
        const playlistContainer = document.getElementById('playlist-container');
        const trackList = document.getElementById('track-list');
        const trackCount = document.getElementById('track-count');
        
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        
        const volumeBar = document.getElementById('volume-bar');
        const volumeFill = document.getElementById('volume-fill');
        
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const playerArt = document.getElementById('player-art');
        const albumArt = document.getElementById('album-art');

        const formatTime = (time) => {
            if (isNaN(time)) return "0:00";
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        };

        const getGradient = () => {
            const colors = ['#8B5CF6', '#EC4899', '#3B82F6', '#10B981', '#F59E0B', '#EF4444'];
            return `linear-gradient(135deg, ${colors[Math.floor(Math.random()*6)]}, ${colors[Math.floor(Math.random()*6)]})`;
        };

        const toggleModal = (show) => {
            if (show) modal.classList.remove('hidden');
            else modal.classList.add('hidden');
        };

        // 1. Initial Load
        const loadSavedTracks = async () => {
            try {
                const response = await fetch(`${API_BASE}/api/tracks`, { cache: 'no-store' });
                const data = await response.json();
                
                if (data.tracks && data.tracks.length > 0) {
                    playlist = data.tracks.map(track => ({ ...track, gradient: getGradient() }));
                    emptyState.classList.add('hidden');
                    playlistContainer.classList.remove('hidden');
                    trackCount.innerText = `${playlist.length} track${playlist.length > 1 ? 's' : ''}`;
                    renderPlaylist();
                }
            } catch (error) {
                console.error("Backend not connected yet.");
            }
        };
        loadSavedTracks();

        // 2. Submit New Track
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const audioFile = document.getElementById('audio-input').files[0];
            const coverFile = document.getElementById('cover-input').files[0];
            const title = document.getElementById('title-input').value;
            const artist = document.getElementById('artist-input').value;

            if (!audioFile) return;

            submitBtn.innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> Uploading...`;
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append("audio", audioFile);
            formData.append("title", title);
            formData.append("artist", artist);
            if (coverFile) formData.append("cover", coverFile);

            try {
                const response = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
                const result = await response.json();
                
                const newTracks = result.tracks.map(track => ({ ...track, gradient: getGradient() }));
                const previousLength = playlist.length;
                playlist = [...playlist, ...newTracks];

                emptyState.classList.add('hidden');
                playlistContainer.classList.remove('hidden');
                trackCount.innerText = `${playlist.length} track${playlist.length > 1 ? 's' : ''}`;
                renderPlaylist();

                if (currentTrackIndex === -1 && playlist.length > 0) {
                    loadTrack(previousLength); 
                    togglePlay();
                }
                
                toggleModal(false);
                uploadForm.reset();
            } catch (error) {
                alert("Failed to upload music. Is your server running?");
            } finally {
                submitBtn.innerHTML = `Upload to Library`;
                submitBtn.disabled = false;
            }
        });

        // 3. Render Playlist
        const renderPlaylist = () => {
            trackList.innerHTML = '';
            playlist.forEach((track, index) => {
                const isActive = index === currentTrackIndex;
                const trackEl = document.createElement('div');
                trackEl.className = `grid grid-cols-[auto_1fr_auto] gap-4 px-4 py-3 rounded-xl items-center cursor-pointer transition-colors group ${isActive ? 'bg-white/10' : 'hover:bg-white/5'}`;
                trackEl.onclick = () => {
                    if (currentTrackIndex !== index) { loadTrack(index); if (!isPlaying) togglePlay(); } 
                    else { togglePlay(); }
                };

                let iconHtml = `<span class="group-hover:hidden">${index + 1}</span><i class="ph-fill ph-play hidden group-hover:block mx-auto text-white"></i>`;
                if (isActive) iconHtml = isPlaying ? `<i class="ph-fill ph-speaker-high text-indigo-400"></i>` : `<i class="ph-fill ph-pause text-indigo-400"></i>`;

                // Logic for Cover Art vs Gradient
                const artHtml = track.cover_url 
                    ? `<img src="${track.cover_url}" class="w-full h-full object-cover">` 
                    : ``;
                const artStyle = track.cover_url ? `background: transparent;` : `background: ${track.gradient};`;

                trackEl.innerHTML = `
                    <div class="w-8 text-center text-gray-500 font-medium">${iconHtml}</div>
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="w-10 h-10 rounded-md flex-shrink-0 overflow-hidden" style="${artStyle}">${artHtml}</div>
                        <div class="truncate">
                            <p class="font-semibold truncate ${isActive ? 'text-indigo-400' : 'text-white'}">${track.title}</p>
                            <p class="text-sm text-gray-500 truncate">${track.artist}</p>
                        </div>
                    </div>
                    <div class="w-40 text-right pr-2 text-xs text-gray-500 font-medium hidden md:block">
                        ${track.upload_time}
                    </div>
                `;
                trackList.appendChild(trackEl);
            });
        };

        // 4. Audio Controls
        const loadTrack = (index) => {
            currentTrackIndex = index;
            const track = playlist[index];
            
            audio.src = track.url;
            audio.load();
            
            playerTitle.innerText = track.title;
            playerArtist.innerText = track.artist;
            
            const artHtml = track.cover_url ? `<img src="${track.cover_url}" class="w-full h-full object-cover">` : '';
            const artStyle = track.cover_url ? `transparent` : track.gradient;

            playerArt.style.background = artStyle;
            playerArt.innerHTML = artHtml || `<i class="ph ph-music-note text-xl text-gray-700"></i>`;
            
            albumArt.style.background = artStyle;
            albumArt.innerHTML = artHtml || `<i class="ph ph-music-note text-6xl text-gray-700"></i>`;

            progressBar.disabled = false;
            if(isPlaying) audio.play();
            renderPlaylist();
        };

        const togglePlay = () => {
            if (currentTrackIndex === -1) return;
            if (isPlaying) { audio.pause(); playIcon.classList.replace('ph-pause', 'ph-play'); playIcon.classList.add('ml-1'); } 
            else { audio.play(); playIcon.classList.replace('ph-play', 'ph-pause'); playIcon.classList.remove('ml-1'); }
            isPlaying = !isPlaying;
            renderPlaylist();
        };

        const playNext = () => {
            if (playlist.length === 0) return;
            loadTrack((currentTrackIndex + 1) % playlist.length);
        };

        const playPrev = () => {
            if (playlist.length === 0) return;
            if (audio.currentTime > 3) { audio.currentTime = 0; return; }
            loadTrack(currentTrackIndex === 0 ? playlist.length - 1 : currentTrackIndex - 1);
        };

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);
        audio.addEventListener('ended', playNext);
        document.addEventListener('keydown', (e) => {
            // Ignore if the user is typing inside an input field (like the upload form)
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }
            
            // Check if the pressed key is the spacebar
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault(); // Prevents the browser from scrolling down the page
                togglePlay();
            }
        });
        // ----------------------------------------------

        // Auto-play next track when current finishes
        audio.addEventListener('ended', playNext);
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.value = percent;
            progressFill.style.width = `${percent}%`;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => { totalTimeEl.innerText = formatTime(audio.duration); });

        progressBar.addEventListener('input', (e) => {
            if (!audio.duration) return;
            audio.currentTime = (e.target.value / 100) * audio.duration;
            progressFill.style.width = `${e.target.value}%`;
        });

        volumeBar.addEventListener('input', (e) => {
            audio.volume = e.target.value;
            volumeFill.style.width = `${e.target.value * 100}%`;
            const icon = volumeBar.previousElementSibling;
            if(audio.volume === 0) icon.className = "ph-fill ph-speaker-none text-gray-400 text-lg";
            else if(audio.volume < 0.5) icon.className = "ph-fill ph-speaker-low text-gray-400 text-lg";
            else icon.className = "ph-fill ph-speaker-high text-gray-400 text-lg";
        });
    </script>
</body>
</html>
